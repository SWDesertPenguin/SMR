# Builds SMR installers for Windows and macOS with electron-builder, then a
# single job attaches them all to one draft GitHub Release. Splitting build from
# publish means only one job ever creates the release, so the two OS legs can't
# race and mint duplicate drafts (which they did on v2.0.0).
#
# Push a version tag (e.g. `v2.0.1`) to build and publish a DRAFT release you
# then review and publish by hand. A manual workflow_dispatch run only builds
# and uploads artifacts (a smoke test) without creating a release.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js 20.x
        uses: actions/setup-node@v5
        with:
          node-version: 20.x
          cache: 'npm'
      - run: npm ci
      - name: Build installers
        run: npx electron-builder --publish never
        env:
          # No Apple certificate, so skip code signing on the macOS leg.
          CSC_IDENTITY_AUTO_DISCOVERY: false
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest*.yml
          if-no-files-found: error

  release:
    needs: build
    # Only publish on a tag; a manual run stops after building artifacts.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        # Create the draft on first run; on a re-run of the same tag, refresh its
        # assets instead of failing.
        run: |
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/* --repo "$REPO" --clobber
          else
            gh release create "$TAG" artifacts/* --repo "$REPO" --draft --title "$TAG" --generate-notes
          fi
