# Builds SMR installers for Windows and macOS with electron-builder and attaches
# them to a GitHub Release. Push a version tag (e.g. `v2.0.0`) to build and
# publish a DRAFT release you then review and publish by hand. A manual
# workflow_dispatch run builds on both OSes without publishing (a smoke test).
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# GITHUB_TOKEN needs write access to create the release and upload assets.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      - run: npm ci
      # Publish only on a tag; a manual run builds without touching any release.
      - name: Build installers
        run: npx electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No Apple certificate, so skip code signing on the macOS leg.
          CSC_IDENTITY_AUTO_DISCOVERY: false
